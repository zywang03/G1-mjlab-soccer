# Soccer Environment Settings
# ==========================
# Single source of truth for key soccer-specific parameters.
# All code should reference these values (via soccer_settings.py).

# Ball parameters (Size 4 football: radius 0.10m, mass 0.35kg).
ball:
  radius: 0.10 # m — Size 4 football
  mass: 0.35 # kg
  # Solid sphere inertia: I = 2/5 * m * r^2
  inertia: [0.0014, 0.0014, 0.0014, 0, 0, 0]
  # Air drag (applied per-step via MuJoCo fluid model).
  air_drag:
    enabled: true
    fluid_coef: 0.10 # MuJoCo fluidshape coefficient (ellipsoid drag)

# Goal dimensions.
goal:
  width: 3.0 # m — inner width between posts
  height: 1.8 # m — inner height (crossbar)

# Penalty spot.
penalty_spot:
  distance_from_goal: 4.0 # m — ball-to-goal line distance in x

# Scene layout (world-frame positions).
# ball_pos and shooter_pos are derived from penalty_spot.distance_from_goal.
scene:
  goal_pos: [0.0, 0.0, 0.0]
  goalkeeper_pos: [0.0, 0.0, 0.8]
  shooter_behind_ball: 1.0  # m — shooter stands this far behind the ball (avoid foot/ball collision at reset)
  # Motion data is recorded near origin (robot pelvis ~(0.12,-0.11,0.82),
  # facing -y). These offsets map motion-frame coordinates to world-frame:
  #   world_xy = motion_xy + motion_origin_offset.xy
  #   world_yaw = motion_yaw + motion_yaw_offset
  # The defaults place the robot at ~(-5, 0) facing +x (toward goal at origin).
  # Use a slightly negative x offset to keep the robot behind the ball at (-4,0).
  motion_origin_offset: [-5.6, 0.0, 0.0]
  motion_yaw_offset: 1.5708  # +pi/2 rad

  # Eval positions in motion-local coordinates (G1 near origin, facing -y).
  # These replace the motion_origin_offset + motion_yaw_offset transform:
  # the goal entity and ball are placed directly in front of the robot
  # instead of shifting the robot to world coordinates.
  eval_ball_pos: [0.0, -1.5, 0.11]    # 1.5m in front of G1 (-y direction)
  eval_goal_pos: [0.0, -5.5, 0.0]      # goal 4m from ball (penalty distance)

# Ground contact (shooter reference: restitution 0.8 via solref damping).
ground:
  solref: [0.02, 0.07] # timeconst=0.02, dampratio=0.07 → e≈0.8
  solimp: [0.9, 0.95, 0.001, 0.5, 2]
  friction: [1.0, 1.0] # static, dynamic — matches shooter reference

# Goalkeeper ball landing regions (6 regions matching Humanoid-GK paper eval ranges).
# Each region defines the ball's target landing position range in goal-relative frame
# (y = width along goal line, z = height above ground). The parabolic trajectory
# model computes launch velocity to hit a random point within the chosen region.
# Regions: 0=Left-Mid(+y), 1=Right-Mid(-y), 2=Left-Up(+y), 3=Right-Up(-y),
#          4=Left-Low(+y), 5=Right-Low(-y).
goalkeeper_regions:
  - height: [0.4, 1.2]
    width:  [0.2, 1.2]
  - height: [0.4, 1.2]
    width:  [-1.2, -0.2]
  - height: [1.2, 1.6]
    width:  [0.2, 1.2]
  - height: [1.2, 1.6]
    width:  [-1.2, -0.2]
  - height: [0.1, 0.3]
    width:  [0.2, 1.2]
  - height: [0.1, 0.3]
    width:  [-1.2, -0.2]

# Ball trajectory (matching Humanoid-GK assign_ball_states).
# G1 faces +x (yaw=0). Ball starts at +x [3,5]m front, lands at -x behind.
ball_trajectory:
  ball_start_distance: [3.0, 5.0] # m — front of robot (+x)
  ball_end_distance: [0.1, 0.6] # m — (negated: behind robot at -x)
  t_flight: [0.4, 1.0] # s — official train flight time

# Goalkeeper training settings.
goalkeeper_training:
  ee_reach_std: 0.3             # legacy field kept for old configs; sigmoid reach now uses values below
  ee_reach_catch_distance: 0.20 # d_keep in the paper's sigmoid reach reward
  ee_reach_sigmoid_scale: 5.0   # official catch_sigma
  approach_distance_threshold: 0.8 # switch from landing target to live ball earlier for final interception
  stop_ball_vel_drop: 2.0       # m/s velocity drop threshold for block detection
  behind_robot_x: 0.0           # x threshold for "ball behind robot"
  episode_length_s: 3.0         # matches goalkeeper_episode_length_s

# Shooter ball velocity (for moving-ball kick scenarios).
shooter_ball_vel:
  speed: 5.0 # m/s — initial ball speed for kick evaluation

# Episode timeout.
episode_length_s: 10.0 # shooter episodes
goalkeeper_episode_length_s: 3.0 # goalkeeper episodes (matches paper)
